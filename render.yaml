services:
  - type: web
    name: authservice
    runtime: java
    buildCommand: ./mvnw package -DskipTests
    startCommand: java -jar target/authservice-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: authservice-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: authservice-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: authservice-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 86400000
      - key: JWT_REFRESH_EXPIRATION
        value: 604800000

databases:
  - name: authservice-db
    databaseName: authservice
    user: postgres
    plan: free